<div class="form-container">

    <h2>Create Task</h2>

    <form [formGroup]="form" (ngSubmit)="submit()">

        <div class="form-group">

            <label for="title">Task Title</label>
            <input id="title" type="text" formControlName="title" placeholder="Task Title"
                [class.error]="form.controls.title.touched && form.controls.title.invalid">

            @if (form.controls.title.touched && form.controls.title.invalid) {
            <small class="error-text">Title is required</small>
            }

        </div>

        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" formControlName="status">
                <option value="To Do">To Do</option>
                <option value="In Progress">In Progress</option>
                <option value="Done">Done</option>
            </select>
        </div>

        <button type="submit" [disabled]="form.invalid" class="submit-btn">
            Add Task
        </button>

    </form>

</div>
