<h2>Task List</h2>

<ul>
    <li *ngFor="let task of tasks">
        <a [routerLink]="['/task', task.id]">
            <strong>{{ task.title }}</strong> -
            <span [style.color]="statusColorMapping[task.status]">{{ task.status}}</span>
        </a>
    </li>
</ul>
