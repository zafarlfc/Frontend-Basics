<div class="list-container">
    <div class="header">
        <h2>My Tasks</h2>
        <button class="create-btn" [routerLink]="['/create']">
            <span class="icon">+</span> Create Task
        </button>
    </div>

    <div class="task-grid">
        @for (task of tasks; track task.id) {
        <a [routerLink]="['/task', task.id]" class="task-card">
            <div class="task-info">
                <span class="task-title">{{ task.title }}</span>
                <span class="task-status" [style.background-color]="statusColorMapping[task.status]">
                    {{ task.status }}
                </span>
            </div>
            <span class="arrow">→</span>
        </a>
        } @empty {
        <div class="empty-state">
            <p>No tasks found. Start by creating one!</p>
        </div>
        }
    </div>
</div>
